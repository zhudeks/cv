<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Admin Panel</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content login-box">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter admin password" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <p class="hint">Default password: <code>admin123</code></p>
            </form>
        </div>
    </div>

    <!-- Main Admin Panel -->
    <div id="adminPanel" class="admin-panel hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-user-tie"></i> CV Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-section="profile">
                    <i class="fas fa-user"></i> Profile
                </a>
                <a href="#" class="nav-item" data-section="summary">
                    <i class="fas fa-file-alt"></i> Summary
                </a>
                <a href="#" class="nav-item" data-section="skills">
                    <i class="fas fa-tools"></i> Skills
                </a>
                <a href="#" class="nav-item" data-section="experience">
                    <i class="fas fa-briefcase"></i> Experience
                </a>
                <a href="#" class="nav-item" data-section="education">
                    <i class="fas fa-graduation-cap"></i> Education
                </a>
                <a href="#" class="nav-item" data-section="files">
                    <i class="fas fa-folder-open"></i> File Manager
                </a>
                <a href="#" class="nav-item" data-section="settings">
                    <i class="fas fa-cog"></i> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="../index.html" class="btn btn-secondary" target="_blank">
                    <i class="fas fa-external-link-alt"></i> View CV
                </a>
                <button id="logoutBtn" class="btn btn-danger">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <main class="admin-content">
            <header class="content-header">
                <h1 id="sectionTitle">Profile</h1>
                <button id="saveBtn" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
            </header>

            <div class="content-body">
                <!-- Profile Section -->
                <div id="profileSection" class="edit-section active">
                    <div class="form-group">
                        <label for="profileName">Full Name</label>
                        <input type="text" id="profileName" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label for="profileTitle">Job Title</label>
                        <input type="text" id="profileTitle" placeholder="Your job title">
                    </div>
                    <div class="form-group">
                        <label for="profileAvatar">Avatar Image Path</label>
                        <input type="text" id="profileAvatar" placeholder="images/avatar.jpg">
                        <button class="btn btn-secondary btn-sm" onclick="selectFromFiles('profileAvatar')" style="margin-top: 8px;">
                            <i class="fas fa-folder-open"></i> Choose from Files
                        </button>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="profileEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="profilePhone" placeholder="+374 77 261190">
                    </div>
                    <div class="form-group">
                        <label>LinkedIn URL</label>
                        <input type="url" id="profileLinkedin" placeholder="https://linkedin.com/in/yourprofile">
                    </div>
                    <div class="form-group">
                        <label>GitHub URL</label>
                        <input type="url" id="profileGithub" placeholder="https://github.com/yourusername">
                    </div>
                </div>

                <!-- Summary Section -->
                <div id="summarySection" class="edit-section">
                    <div class="form-group">
                        <label for="summaryText">Professional Summary</label>
                        <textarea id="summaryText" rows="6" placeholder="Write your professional summary..."></textarea>
                    </div>
                </div>

                <!-- Skills Section -->
                <div id="skillsSection" class="edit-section">
                    <div id="skillsList" class="items-list">
                        <!-- Skills will be rendered here -->
                    </div>
                    <button class="btn btn-secondary add-item-btn" onclick="addNewSkill()">
                        <i class="fas fa-plus"></i> Add Skill Category
                    </button>
                </div>

                <!-- Experience Section -->
                <div id="experienceSection" class="edit-section">
                    <div id="experienceList" class="items-list">
                        <!-- Experience items will be rendered here -->
                    </div>
                    <button class="btn btn-secondary add-item-btn" onclick="addNewExperience()">
                        <i class="fas fa-plus"></i> Add Experience
                    </button>
                </div>

                <!-- Education Section -->
                <div id="educationSection" class="edit-section">
                    <div id="educationList" class="items-list">
                        <!-- Education items will be rendered here -->
                    </div>
                    <button class="btn btn-secondary add-item-btn" onclick="addNewEducation()">
                        <i class="fas fa-plus"></i> Add Education
                    </button>
                </div>

                <!-- File Manager Section -->
                <div id="filesSection" class="edit-section">
                    <div class="file-manager">
                        <div class="file-upload-area">
                            <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFileSelect(event)">
                            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-upload"></i> Upload Files
                            </button>
                            <p>Drag & drop files here or click to browse</p>
                            <p class="hint">Supported: JPG, PNG, GIF, SVG, WEBP</p>
                        </div>
                        
                        <div class="file-search">
                            <input type="text" id="fileSearch" placeholder="Search files..." oninput="filterFiles()">
                            <select id="fileFilter" onchange="filterFiles()">
                                <option value="all">All Files</option>
                                <option value="images">Images</option>
                                <option value="avatars">Avatars</option>
                                <option value="logos">Logos</option>
                            </select>
                        </div>

                        <div id="filesGrid" class="files-grid">
                            <!-- Files will be rendered here -->
                        </div>

                        <div id="filePreview" class="file-preview hidden">
                            <h3>File Preview</h3>
                            <img id="previewImage" src="" alt="Preview">
                            <p id="previewName"></p>
                            <p id="previewSize"></p>
                            <p id="previewDate"></p>
                            <div class="preview-actions">
                                <button class="btn btn-primary" onclick="useSelectedFile()">
                                    <i class="fas fa-check"></i> Use This File
                                </button>
                                <button class="btn btn-secondary" onclick="closePreview()">
                                    <i class="fas fa-times"></i> Close
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Settings Section -->
                <div id="settingsSection" class="edit-section">
                    <div class="form-group">
                        <label for="primaryColor">Primary Color</label>
                        <input type="color" id="primaryColor" value="#e63946">
                    </div>
                    <div class="form-group">
                        <label for="adminPassword">Change Admin Password</label>
                        <input type="password" id="adminPassword" placeholder="New password">
                    </div>
                    <button class="btn btn-primary" onclick="updatePassword()">
                        <i class="fas fa-key"></i> Update Password
                    </button>
                    <hr>
                    <button class="btn btn-danger" onclick="resetToDefault()">
                        <i class="fas fa-trash-alt"></i> Reset to Default
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- File Selection Modal -->
    <div id="fileSelectModal" class="modal hidden">
        <div class="modal-content file-select-box">
            <h2><i class="fas fa-folder-open"></i> Select File</h2>
            <div id="fileSelectGrid" class="files-grid"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeFileSelect()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
