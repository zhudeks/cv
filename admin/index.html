<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CV Admin Panel</title><link rel="icon" type="image/png" href="images/favicon.png"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700^&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="css/admin.css"></head><body><div id="loginModal" class="modal"><div class="modal-content login-box"><h2><i class="fas fa-lock"></i> Admin Login</h2><form id="loginForm"><div class="form-group"><label for="password">Password</label><input type="password" id="password" placeholder="Enter admin password" required></div><button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt"></i> Login</button><p class="hint">Default password: <code>admin123</code></p></form></div></div><div id="adminPanel" class="admin-panel hidden"><aside class="sidebar"><div class="sidebar-header"><h2><i class="fas fa-user-tie"></i> CV Admin</h2></div><nav class="sidebar-nav"><a href="#" class="nav-item active" data-section="profile"><i class="fas fa-user"></i> Profile</a><a href="#" class="nav-item" data-section="summary"><i class="fas fa-file-alt"></i> Summary</a><a href="#" class="nav-item" data-section="skills"><i class="fas fa-tools"></i> Skills</a><a href="#" class="nav-item" data-section="experience"><i class="fas fa-briefcase"></i> Experience</a><a href="#" class="nav-item" data-section="education"><i class="fas fa-graduation-cap"></i> Education</a><a href="#" class="nav-item" data-section="settings"><i class="fas fa-cog"></i> Settings</a></nav><div class="sidebar-footer"><a href="../index.html" class="btn btn-secondary" target="_blank"><i class="fas fa-external-link-alt"></i> View CV</a><button id="logoutBtn" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button></div></aside><main class="admin-content"><header class="content-header"><h1 id="sectionTitle">Profile</h1><button id="saveBtn" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button></header><div class="content-body"><div id="profileSection" class="edit-section active"><div class="form-group"><label for="profileName">Full Name</label><input type="text" id="profileName"></div><div class="form-group"><label for="profileTitle">Job Title</label><input type="text" id="profileTitle"></div><div class="form-group"><label for="profileAvatar">Avatar Image Path</label><input type="text" id="profileAvatar"></div><div class="form-group"><label>Email</label><input type="email" id="profileEmail"></div><div class="form-group"><label>Phone</label><input type="tel" id="profilePhone"></div><div class="form-group"><label>LinkedIn URL</label><input type="url" id="profileLinkedin"></div><div class="form-group"><label>GitHub URL</label><input type="url" id="profileGithub"></div></div><div id="summarySection" class="edit-section"><div class="form-group"><label for="summaryText">Professional Summary</label><textarea id="summaryText" rows="6"></textarea></div></div><div id="skillsSection" class="edit-section"><div id="skillsList" class="items-list"></div><button class="btn btn-secondary add-item-btn" onclick="addNewSkill()"><i class="fas fa-plus"></i> Add Skill Category</button></div><div id="experienceSection" class="edit-section"><div id="experienceList" class="items-list"></div><button class="btn btn-secondary add-item-btn" onclick="addNewExperience()"><i class="fas fa-plus"></i> Add Experience</button></div><div id="educationSection" class="edit-section"><div id="educationList" class="items-list"></div><button class="btn btn-secondary add-item-btn" onclick="addNewEducation()"><i class="fas fa-plus"></i> Add Education</button></div><div id="settingsSection" class="edit-section"><div class="form-group"><label for="primaryColor">Primary Color</label><input type="color" id="primaryColor" value="#e63946"></div><div class="form-group"><label for="adminPassword">Change Admin Password</label><input type="password" id="adminPassword"></div><button class="btn btn-primary" onclick="updatePassword()"><i class="fas fa-key"></i> Update Password</button><hr><button class="btn btn-danger" onclick="resetToDefault()"><i class="fas fa-trash-alt"></i> Reset to Default</button></div></div></main></div><script src="js/admin.js"></script></body></html>
